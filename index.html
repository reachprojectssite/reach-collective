<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Facebook Meta Tags -->

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="twitter:domain" content="reachnationals.org" />
    <meta property="twitter:url" content="https://reachnationals.org" />
    <meta name="twitter:title" content="REACH Nationals - National Influencer Organization" />
    <meta name="twitter:description" content="Empowering the next generation of digital influencers and marketers through collaborative learning, industry connections, and hands-on experiences." />

    <link rel="canonical" href="https://reachnationals.org" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <link rel="icon" type="image/png" href="/reachlog.png" />

    <!-- Preload the homepage hero image so it can race the JS bundle.
         Helps LCP on /. Other routes have their own hero img with loading="eager". -->
    <link rel="preload" as="image" href="/images/hero/thisphoto.webp" fetchpriority="high">

    <!-- Non-blocking Google Fonts. Preconnect opens the connection early; the stylesheet
         is requested with media="print" then flipped to all once loaded so it does not
         block first paint. Reduces render-blocking time by ~1.4s on mobile. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=DM+Mono:wght@400;500&family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=DM+Mono:wght@400;500&family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=DM+Mono:wght@400;500&family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600;700&display=swap"></noscript>

    <!-- Organization JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "REACH Nationals",
      "alternateName": "Reach Nationals Corp.",
      "url": "https://reachnationals.org",
      "logo": "https://reachnationals.org/reachlog.png",
      "description": "REACH Nationals is the national collegiate creator economy organization. We run student-led chapters on dozens of campuses that train the next generation of creators, brand marketers, and creator-economy operators.",
      "sameAs": [
        "https://www.instagram.com/reachnatl",
        "https://www.linkedin.com/company/reach-fam"
      ]
    }
    </script>

    <!-- WebSite JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "REACH Nationals",
      "url": "https://reachnationals.org",
      "publisher": {
        "@type": "Organization",
        "name": "REACH Nationals"
      }
    }
    </script>
  </head>

  <body>
    <!-- Hidden contact form for Netlify -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="subject">
        <option value="General Inquiry">General Inquiry</option>
        <option value="Chapter Support">Chapter Support</option>
        <option value="Brand Partnership">Brand Partnership</option>
        <option value="Press & Media">Press & Media</option>
      </select>
      <textarea name="message"></textarea>
      <input type="hidden" name="bot-field" />
    </form>

    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
